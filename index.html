<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PROJECT_225 // TOTAL_SYNC_V8</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --cp-yellow: #fcee0a;
            --cp-blue: #00f0ff;
            --cp-black: #050505;
            --cp-red: #ff003c;
            --cp-green: #00ff9f;
        }

        body {
            background-color: var(--cp-black);
            color: var(--cp-yellow);
            font-family: 'Courier New', monospace;
            padding: 20px;
            text-transform: uppercase;
            background-image: linear-gradient(rgba(0,0,0,0.3) 50%, rgba(0,0,0,0) 50%), linear-gradient(90deg, rgba(255,0,0,0.02), rgba(0,255,0,0.01), rgba(0,0,255,0.02));
            background-size: 100% 2px, 3px 100%;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            border: 2px solid var(--cp-yellow);
            padding: 25px;
            box-shadow: 8px 8px 0px var(--cp-red);
            background: rgba(5,5,5,0.95);
        }

        .progress-section {
            margin-bottom: 30px;
            border: 2px solid var(--cp-blue);
            padding: 20px;
            background: rgba(0, 240, 255, 0.05);
            text-align: center;
        }

        .target-number {
            font-size: 4rem;
            font-weight: 900;
            color: var(--cp-yellow);
            text-shadow: 0 0 20px var(--cp-red);
            line-height: 1;
        }

        .bar-container {
            height: 45px;
            background: #000;
            border: 2px solid var(--cp-yellow);
            position: relative;
            margin: 20px 0;
            overflow: hidden;
        }

        #progressBar {
            height: 100%;
            background: linear-gradient(90deg, var(--cp-red), var(--cp-yellow));
            width: 0%;
            transition: 2s;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .card {
            border: 1px solid var(--cp-yellow);
            padding: 15px;
            background: rgba(252,238,10,0.03);
        }

        .stat-val {
            font-size: 2rem;
            color: var(--cp-blue);
            font-weight: bold;
        }

        input, button {
            background: #000;
            border: 1px solid var(--cp-blue);
            color: var(--cp-blue);
            padding: 12px;
            width: 100%;
            box-sizing: border-box;
            margin-bottom: 10px;
            font-family: inherit;
            font-weight: bold;
        }

        button {
            background: var(--cp-yellow);
            color: var(--cp-black);
            cursor: pointer;
            border: none;
        }

            button:hover {
                background: var(--cp-blue);
                box-shadow: 0 0 20px var(--cp-blue);
            }

        #status {
            font-size: 0.7rem;
            color: var(--cp-green);
            margin-bottom: 15px;
            border-left: 3px solid var(--cp-green);
            padding-left: 10px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="status">> SYSTEM_STABLE // CLOUD_SYNC_ENABLED</div>

        <div class="progress-section">
            <div style="color: var(--cp-red); letter-spacing: 5px; font-size: 0.8rem;">MISSION_GOAL: 225 LBS</div>
            <div class="target-number">225</div>
            <div class="bar-container"><div id="progressBar"></div></div>
            <div id="percentDone" style="font-weight: bold; color: var(--cp-blue);">0% DELETED</div>
        </div>

        <div class="grid">
            <div class="card" style="border-color: var(--cp-green);"><div>EXPENDITURE</div><div id="tdeeDisplay" class="stat-val">---</div></div>
            <div class="card" style="border-color: var(--cp-red);"><div>FUEL_GOAL</div><div id="calGoal" class="stat-val">2200</div></div>
            <div class="card" style="border-color: var(--cp-blue);"><div>TREND_WEIGHT</div><div id="trendWeight" class="stat-val">---</div></div>
        </div>

        <div class="grid" style="grid-template-columns: 1fr 2fr;">
            <div class="card">
                <h3>> SYNC_DATA</h3>
                <input type="date" id="dInput">
                <input type="number" id="wInput" step="0.1" placeholder="MASS (LBS)">
                <input type="number" id="cInput" placeholder="KCAL">
                <button onclick="sendData()">UPLOAD_TO_CLOUD</button>
                <button onclick="pullData()" style="background:transparent; color:var(--cp-blue); border-color:var(--cp-blue); margin-top:5px;">MANUAL_REFRESH</button>
            </div>
            <div class="card">
                <h3>> TRAJECTORY_HUD</h3>
                <canvas id="chart" height="150"></canvas>
            </div>
        </div>
    </div>

    <script>
        const TARGET = 225;
        const READ_LINK = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTQgFT19Nm-hcjssSvBNaeRp7FaPjGFE4BdMutHO_kxYiorB0IKnXyV8rG7SojQjGPXIYHZ3Mu_HBhl/pub?gid=0&single=true&output=csvhttps://docs.google.com/spreadsheets/d/e/2PACX-1vTQgFT19Nm-hcjssSvBNaeRp7FaPjGFE4BdMutHO_kxYiorB0IKnXyV8rG7SojQjGPXIYHZ3Mu_HBhl/pub?gid=29801472&single=true&output=csv';
        const FORM_URL = 'https://docs.google.com/forms/d/e/1FAIpQLSelMhZLX7jmpppjvKBBABrENv0FWdZt4cPTVqoo2tO8I57K1w/formResponse';

        const ID_DATE = 'entry.1257512782';
        const ID_WEIGHT = 'entry.1562312499';
        const ID_KCAL = 'entry.272206994';

        document.getElementById('dInput').valueAsDate = new Date();

        async function pullData() {
            const statusElement = document.getElementById('status');
            statusElement.innerText = "> INITIATING_CLOUD_PULL...";

            try {
                // We'll try the direct pull first (works on GitHub/Drive)
                const response = await fetch(READ_LINK + '&t=' + Date.now());

                if (!response.ok) throw new Error('OFFLINE');

                const text = await response.text();
                const rows = text.split('\n').slice(1);

                logs = rows.map(r => {
                    const c = r.split(',');
                    // Mapping: A=Date, B=Weight, C=Cals
                    return { d: c[0], w: parseFloat(c[1]), c: parseInt(c[2]) };
                }).filter(l => !isNaN(l.w));

                if (logs.length === 0) {
                    statusElement.innerText = "> ERR: DATABASE_IS_EMPTY";
                } else {
                    updateUI();
                    statusElement.innerText = "> SYNC_SUCCESSFUL // DATA_STREAM_STABLE";
                }
            } catch (e) {
                // If the direct pull fails, it's likely a browser security block
                statusElement.innerText = "> ERR: SECURITY_BLOCK (USE_GITHUB_OR_DRIVE)";
                console.error('Connection Error:', e);
            }
        }

        function sendData() {
            const d = document.getElementById('dInput').value;
            const w = document.getElementById('wInput').value;
            const c = document.getElementById('cInput').value;

            if (!w || !c || !d) { alert("DATA_REQUIRED"); return; }

            const submitUrl = `${FORM_URL}?${ID_DATE}=${d}&${ID_WEIGHT}=${w}&${ID_KCAL}=${c}&submit=Submit`;

            // This opens a tiny pop-up and closes it immediately to confirm submission
            const syncWin = window.open(submitUrl, 'sync', 'width=100,height=100');
            setTimeout(() => {
                if (syncWin) syncWin.close();
                document.getElementById('status').innerText = "> UPLOAD_COMPLETE. REFRESH IN 15S.";
            }, 1500);
        }

        function updateUI(logs) {
            if (!logs.length) return;
            const last = logs[logs.length - 1];
            const start = logs[0].w;
            document.getElementById('trendWeight').innerText = last.w;
            const pct = Math.min(Math.max(((start - last.w) / (start - TARGET)) * 100, 0), 100).toFixed(1);
            document.getElementById('progressBar').style.width = pct + "%";
            document.getElementById('percentDone').innerText = pct + "% PURGED";

            const ctx = document.getElementById('chart').getContext('2d');
            if (window.myChart) window.myChart.destroy();
            window.myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: logs.map(l => l.d),
                    datasets: [{ data: logs.map(l => l.w), borderColor: '#fcee0a', tension: 0.3 }]
                },
                options: { plugins: { legend: { display: false } }, scales: { y: { ticks: { color: '#fcee0a' } }, x: { ticks: { color: '#fcee0a' } } } }
            });

            if (logs.length >= 7) {
                const days = Math.max((new Date(last.d) - new Date(logs[0].d)) / 86400000, 1);
                const tdee = Math.round((logs.reduce((s, e) => s + e.c, 0) / logs.length) + ((logs[0].w - last.w) * 3500 / days));
                document.getElementById('tdeeDisplay').innerText = tdee;
                document.getElementById('calGoal').innerText = tdee - 1000;
            }
        }

        pullData();
    </script>
</body>
</html>
