<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROJECT_225 // TACTICAL_STRAT_OS</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --cp-yellow: #fcee0a;
            --cp-blue: #00f0ff;
            --cp-black: #050505;
            --cp-red: #ff003c;
            --cp-green: #00ff9f;
        }

        body {
            background-color: var(--cp-black);
            color: var(--cp-yellow);
            font-family: 'Courier New', monospace;
            padding: 15px;
            text-transform: uppercase;
            background-image: linear-gradient(rgba(0,0,0,0.3) 50%, rgba(0,0,0,0) 50%), linear-gradient(90deg, rgba(255,0,0,0.02), rgba(0,255,0,0.01), rgba(0,0,255,0.02));
            background-size: 100% 2px, 3px 100%;
            margin: 0;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            border: 2px solid var(--cp-yellow);
            padding: 20px;
            box-shadow: 8px 8px 0px var(--cp-red);
            background: rgba(5,5,5,0.95);
        }

        /* MISSION HUD */
        .progress-section {
            margin-bottom: 25px;
            border: 2px solid var(--cp-blue);
            padding: 20px;
            background: rgba(0, 240, 255, 0.05);
            text-align: center;
        }

        .target-number {
            font-size: clamp(2.5rem, 8vw, 4rem);
            font-weight: 900;
            color: var(--cp-yellow);
            text-shadow: 0 0 20px var(--cp-red);
            line-height: 1;
        }

        .bar-container {
            height: 35px;
            background: #000;
            border: 2px solid var(--cp-yellow);
            position: relative;
            margin: 15px 0;
            overflow: hidden;
        }

        #progressBar {
            height: 100%;
            background: linear-gradient(90deg, var(--cp-red), var(--cp-yellow));
            width: 0%;
            transition: 2s;
            box-shadow: 0 0 15px var(--cp-yellow);
        }

        .checkpoints {
            display: flex;
            justify-content: space-between;
            font-size: 0.6rem;
            font-weight: bold;
            color: var(--cp-blue);
        }

        /* GRID SYSTEM */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .card {
            border: 1px solid var(--cp-yellow);
            padding: 15px;
            background: rgba(252,238,10,0.03);
            overflow: hidden; /* Stops the card from stretching */
        }

        #chart-container {
            position: relative;
            height: 300px; /* Lock the height */
            width: 100%;
            overflow: hidden;
        }

        .stat-label {
            font-size: 0.6rem;
            color: #888;
            border-bottom: 1px solid #333;
            margin-bottom: 8px;
            padding-bottom: 3px;
        }

        .stat-val {
            font-size: 1.8rem;
            color: var(--cp-blue);
            font-weight: bold;
        }

        /* INPUTS */
        label {
            font-size: 0.6rem;
            color: var(--cp-blue);
            display: block;
            margin-bottom: 5px;
        }

        input, button {
            background: #000;
            border: 1px solid var(--cp-blue);
            color: var(--cp-blue);
            padding: 12px;
            width: 100%;
            box-sizing: border-box;
            margin-bottom: 10px;
            font-family: inherit;
            font-weight: bold;
            font-size: 1rem;
        }

        button {
            background: var(--cp-yellow);
            color: var(--cp-black);
            cursor: pointer;
            border: none;
            transition: 0.2s;
        }

            button:hover {
                background: var(--cp-blue);
                box-shadow: 0 0 20px var(--cp-blue);
            }

        #status {
            font-size: 0.7rem;
            color: var(--cp-green);
            margin-bottom: 15px;
            border-left: 3px solid var(--cp-green);
            padding-left: 10px;
            min-height: 1em;
        }

        canvas {
            background: rgba(0,0,0,0.3);
            padding: 5px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="status">> SYSTEM_INITIALIZING...</div>

        <div class="progress-section">
            <div style="color: var(--cp-red); letter-spacing: 5px; font-size: 0.7rem;">MISSION_GOAL_STATUS</div>
            <div class="target-number">225</div>
            <div class="bar-container"><div id="progressBar"></div></div>
            <div class="checkpoints">
                <span id="startDisplay">---</span><span>-10</span><span>-20</span><span>-30</span><span>-40</span><span>GOAL</span>
            </div>
            <div id="percentDone" style="margin-top: 10px; font-weight: bold; color: var(--cp-blue); font-size: 0.8rem;">0% PURGED</div>
        </div>

        <div class="grid">
            <div class="card" style="border-color: var(--cp-green);">
                <div class="stat-label">TRUE_EXPENDITURE (TDEE)</div>
                <div id="tdeeDisplay" class="stat-val">---</div>
            </div>
            <div class="card" style="border-color: var(--cp-red);">
                <div class="stat-label">ADAPTIVE_FUEL_GOAL</div>
                <div id="calGoal" class="stat-val">---</div>
            </div>
            <div class="card" style="border-color: var(--cp-blue);">
                <div class="stat-label">TREND_WEIGHT</div>
                <div id="trendWeight" class="stat-val">---</div>
            </div>
        </div>

        <div class="grid" style="grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));">
            <div class="card">
                <h3>> SYNC_LOG</h3>
                <label>DATE</label>
                <input type="date" id="dInput">
                <label>WEIGHT (LBS)</label>
                <input type="number" id="wInput" step="0.1" placeholder="000.0">
                <label>CALORIES</label>
                <input type="number" id="cInput" placeholder="0000">
                <button onclick="sendData()">UPLOAD_TO_MAINFRAME</button>
                <button onclick="pullData()" style="background:transparent; color:var(--cp-blue); border-color:var(--cp-blue); margin-top:5px;">MANUAL_REFRESH</button>
            </div>
            <div class="card">
                <h3>> TRAJECTORY_HUD</h3>
                <div id="chart-container">
                    <canvas id="chart"></canvas>
                </div>
            </div>
    </div>

    <script>
        // --- CORE CONFIG ---
        const TARGET = 225;
        const READ_LINK = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTQgFT19Nm-hcjssSvBNaeRp7FaPjGFE4BdMutHO_kxYiorB0IKnXyV8rG7SojQjGPXIYHZ3Mu_HBhl/pub?gid=29801472&single=true&output=csv';
        const FORM_URL = 'https://docs.google.com/forms/d/e/1FAIpQLSelMhZLX7jmpppjvKBBABrENv0FWdZt4cPTVqoo2tO8I57K1w/formResponse';

        const ID_DATE = 'entry.1257512782';
        const ID_WEIGHT = 'entry.1562312499';
        const ID_KCAL = 'entry.272206994';

        document.getElementById('dInput').valueAsDate = new Date();

        async function pullData() {
            const statusElement = document.getElementById('status');
            statusElement.innerText = "> INITIATING_CLOUD_PULL...";

            try {
                const response = await fetch(`${READ_LINK}&cachebust=${Date.now()}`);

                if (!response.ok) {
                    statusElement.innerText = `> ERR: GOOGLE_RETURNED_${response.status}`;
                    return;
                }

                const text = await response.text();

                // Check if Google sent back an HTML login page instead of data
                if (text.includes("<html")) {
                    statusElement.innerText = "> ERR: LINK_EXPIRED_REPUBLISH_SHEET";
                    return;
                }

                const rows = text.split('\n').slice(1);
                const logs = rows.map(r => {
                    const c = r.split(',');
                    return { d: c[0], w: parseFloat(c[1]), c: parseInt(c[2]) };
                }).filter(l => !isNaN(l.w));

                if (logs.length === 0) {
                    statusElement.innerText = "> ERR: SHEET_IS_EMPTY_OR_FORMAT_WRONG";
                } else {
                    updateUI(logs);
                    statusElement.innerText = "> SYNC_SUCCESSFUL // DATA_STREAM_LIVE";
                }
            } catch (e) {
                statusElement.innerText = "> ERR: CROSS_ORIGIN_BLOCK_DETECTED";
                console.error(e);
            }
        }

        function sendData() {
            const d = document.getElementById('dInput').value;
            const w = document.getElementById('wInput').value;
            const c = document.getElementById('cInput').value;

            if (!w || !c || !d) {
                alert("UPLOAD_ERROR: DATA_REQUIRED");
                return;
            }

            const submitUrl = `${FORM_URL}?${ID_DATE}=${d}&${ID_WEIGHT}=${w}&${ID_KCAL}=${c}&submit=Submit`;

            // Background submission
            const img = new Image();
            img.src = submitUrl;

            document.getElementById('status').innerText = "> DATA_UPLOADED. WAIT 20S FOR CLOUD REPLICATION.";
            alert("BIOMETRICS SENT. TERMINAL SYNCING...");
        }

        function updateUI(logs) {
            const last = logs[logs.length - 1];
            const start = logs[0].w;

            document.getElementById('trendWeight').innerText = last.w.toFixed(1);
            document.getElementById('startDisplay').innerText = start.toFixed(1);

            const pct = Math.min(Math.max(((start - last.w) / (start - TARGET)) * 100, 0), 100).toFixed(1);
            document.getElementById('progressBar').style.width = pct + "%";
            document.getElementById('percentDone').innerText = pct + "% PURGED";

            // Chart logic
            const ctx = document.getElementById('chart').getContext('2d');
            if (window.myChart) window.myChart.destroy();
            window.myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: logs.map(l => l.d),
                    datasets: [{
                        data: logs.map(l => l.w),
                        borderColor: '#fcee0a',
                        borderWidth: 3,
                        tension: 0.3,
                        pointBackgroundColor: '#00f0ff',
                        fill: false
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false, // Prevents the vertical growth loop
                    plugins: { legend: { display: false } },
                    scales: {
                        y: {
                            min: 225,  // Your Goal
                            max: 280,  // Your Start
                            ticks: { color: '#fcee0a', stepSize: 5 },
                            grid: { color: '#333' }
                        },
                        x: {
                            ticks: { color: '#fcee0a' },
                            grid: { display: false }
                        }
                    }
                }
            });

            // MacroFactor TDEE Logic (7-day min)
            if (logs.length >= 7) {
                const days = Math.max((new Date(last.d) - new Date(logs[0].d)) / 86400000, 1);
                const totalCals = logs.reduce((s, e) => s + e.c, 0);
                const tdee = Math.round((totalCals / logs.length) + ((logs[0].w - last.w) * 3500 / days));
                document.getElementById('tdeeDisplay').innerText = tdee;
                document.getElementById('calGoal').innerText = tdee - 1000;
            }
        }

        // Auto-pull on launch
        pullData();
    </script>
</body>
</html>
